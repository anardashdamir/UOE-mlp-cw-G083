model:
  name: Qwen/Qwen3.5-4B

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: all-linear

training:
  num_epochs: 1
  batch_size: 16
  gradient_accumulation_steps: 2     # effective batch = 16 * 2 = 32
  learning_rate: 1e-4
  lr_scheduler_type: cosine
  warmup_steps: 50
  max_seq_length: 1024
  max_steps: -1
  logging_steps: 10
  gradient_checkpointing: true

grpo:
  num_epochs: 1
  batch_size: 4
  gradient_accumulation_steps: 8      # effective batch = 4 * 8 = 32
  learning_rate: 5e-6
  max_completion_length: 256
  num_generations: 8
  beta: 0.05
  max_steps: 50

generation:
  max_new_tokens: 256                  # longest filter is ~170 tokens
  temperature: 0.0

wandb:
  enabled: false
  # wandb_project and wandb_api_key loaded from wandb.env

paths:
  train_path: data/train.json
  test_path: data/test.json
  schema_dir: schemas
  output_dir: output

schemas:
  train:
    - bank_transactions
    - board_games
    - books
    - clothes
    - cosmetics_csv
    - dubai_rentals
    - electronics_sales
    - healthcare_insurance
    - netflix_shows
    - steam_game
    - usa_housing_listings
    - zoo_animals
    - imdb_movies
    - udemy
    - video_game_sales
  eval:
    - anime
    - diamonds
    - diabetes
    - used_cars
    - adidas_vs_nike
