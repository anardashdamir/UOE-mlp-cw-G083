model:
  name: Qwen/Qwen3.5-0.8B

lora:
  r: 8
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj

training:
  num_epochs: 3
  batch_size: 2
  gradient_accumulation_steps: 16
  learning_rate: 2e-5
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  max_seq_length: 2048
  max_steps: -1 # -1 = use num_epochs

grpo:
  num_epochs: 1
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 5e-6
  max_completion_length: 256
  num_generations: 4
  beta: 0.1

generation:
  max_new_tokens: 256
  temperature: 0.0

wandb:
  enabled: false # set true when internet is available
  # wandb_project and wandb_api_key loaded from wandb.env
  # run_name: my-experiment  # pass via --run-name flag

paths:
  data_path: data/data.json
  schema_dir: schemas
  output_dir: output

eval:
  schemas:
    - hotel_bookings
    - job_listings
    - restaurant_business_rankings_2020
    - wine_reviews
    - zoo_animals
    - diabetes
    - diamonds
    - electric_vehicles
    - nba_players
    - youtube_statistics
