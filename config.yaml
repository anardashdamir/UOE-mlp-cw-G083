model:
  name: Qwen/Qwen3.5-4B
  enable_thinking: true

lora:
  r: 16
  alpha: 32
  dropout: 0.0
  target_modules: all-linear

training:
  num_epochs: 1
  batch_size: 32
  gradient_accumulation_steps: 1
  learning_rate: 5e-5
  lr_scheduler_type: cosine
  warmup_steps: 30
  max_seq_length: 2048
  max_steps: -1
  logging_steps: 5
  gradient_checkpointing: true

grpo:
  num_epochs: 1
  batch_size: 8                        # doubled — effective batch = 8 * 4 = 32
  gradient_accumulation_steps: 4      # halved — same effective batch, fewer sync steps
  learning_rate: 5e-6
  max_completion_length: 256
  num_generations: 8
  beta: 0.05
  max_steps: 50

generation:
  max_new_tokens: 512                  # thinking + filter needs more tokens
  temperature: 0.0

wandb:
  enabled: false
  # wandb_project and wandb_api_key loaded from wandb.env

paths:
  train_path: data/train.json
  test_path: data/test.json
  schema_dir: schemas
  output_dir: output

schemas:
  train:
    - bank_transactions
    - board_games
    - books
    - clothes
    - cosmetics_csv
    - dubai_rentals
    - electronics_sales
    - healthcare_insurance
    - netflix_shows
    - steam_game
    - usa_housing_listings
    - zoo_animals
    - imdb_movies
    - udemy
    - video_game_sales
  eval:
    - anime
    - diamonds
    - diabetes
    - used_cars
    - adidas_vs_nike
