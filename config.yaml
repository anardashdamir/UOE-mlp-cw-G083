model:
  name: Qwen/Qwen3.5-0.8B

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: all-linear

training:
  num_epochs: 1
  batch_size: 16
  gradient_accumulation_steps: 2     # effective batch = 16 * 2 = 32
  learning_rate: 1e-4
  lr_scheduler_type: cosine
  warmup_steps: 50
  max_seq_length: 1024
  max_steps: -1
  logging_steps: 10
  gradient_checkpointing: true

grpo:
  num_epochs: 1
  batch_size: 8
  gradient_accumulation_steps: 4      # effective batch = 8 * 4 = 32
  learning_rate: 5e-6
  max_completion_length: 128          # most filters are <100 tokens
  num_generations: 8                  # more rolls = better signal for binary reward
  beta: 0.05
  max_steps: 32                       # ~1000 samples, enough for GRPO

generation:
  max_new_tokens: 256                  # longest filter is ~170 tokens
  temperature: 0.0

wandb:
  enabled: false
  # wandb_project and wandb_api_key loaded from wandb.env

paths:
  data_path: data/data.json
  schema_dir: schemas
  output_dir: output

eval:
  exclude_schemas: []
  schemas:
    - diabetes
    - diamonds
    - anime
    - zoo_animals
    - airbnb_open_data
