model:
  name: Qwen/Qwen3.5-0.8B

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "v_proj"]

training:
  num_epochs: 3
  batch_size: 16
  gradient_accumulation_steps: 2     # effective batch = 16 * 2 = 32
  learning_rate: 1e-4
  lr_scheduler_type: cosine
  warmup_steps: 50
  max_seq_length: 1024
  max_steps: -1
  logging_steps: 10
  gradient_checkpointing: true

grpo:
  num_epochs: 1
  batch_size: 1
  gradient_accumulation_steps: 32  
  learning_rate: 5e-6
  max_completion_length: 256
  num_generations: 4
  beta: 0.1

generation:
  max_new_tokens: 256                  # longest filter is ~170 tokens
  temperature: 0.6

wandb:
  enabled: false
  # wandb_project and wandb_api_key loaded from wandb.env

paths:
  data_path: data/data.json
  schema_dir: schemas
  output_dir: output

eval:
  exclude_schemas: []
  schemas:
    - restaurant_business_rankings_2020
    - wine_reviews
    - zoo_animals
    - diabetes
    - diamonds
    - youtube_statistics
    - anime
    - olympic_athletes
    - used_cars
    - airbnb_open_data
